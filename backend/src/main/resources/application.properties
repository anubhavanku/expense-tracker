spring.application.name=backend

# Database — reads from env variables with local fallback
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/expense_tracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:expenseuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:expense123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080

# JWT
jwt.secret=${JWT_SECRET:expense-tracker-super-secret-key-2026-anubhav-very-long-key}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

springdoc.swagger-ui.disable-swagger-default-url=true
springdoc.override-with-generic-response=false
spring.mvc.pathmatch.use-suffix-pattern=false